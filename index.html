<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudUpload - Profesyonel Dosya Yükleme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Dosya Merkezi</h1>
            <p class="text-slate-500 mt-2">Fotoğraf ve videolarınızı güvenle yükleyin</p>
        </div>

        <!-- Yükleme Alanı -->
        <div id="drop-zone" class="border-3 border-dashed border-blue-200 rounded-xl p-10 text-center hover:border-blue-500 transition-all cursor-pointer bg-blue-50/50">
            <input type="file" id="file-input" multiple class="hidden" accept=".jpg,.jpeg,.png,.heic,.mp4,.mov">
            <i class="fas fa-cloud-upload-alt text-5xl text-blue-500 mb-4"></i>
            <p class="text-lg font-medium text-slate-700">Dosyaları buraya sürükleyin veya tıklayın</p>
            <p class="text-sm text-slate-400 mt-2">JPG, PNG, HEIC, MP4, MOV desteklenir</p>
        </div>

        <!-- Dosya Listesi -->
        <div id="file-list" class="mt-6 space-y-3"></div>

        <!-- Yükleme Butonu -->
        <button id="upload-btn" class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-all shadow-lg disabled:opacity-50 disabled:cursor-not-allowed hidden">
            <i class="fas fa-paper-plane mr-2"></i> Tümünü Yükle
        </button>

        <!-- Durum Bildirimleri -->
        <div id="status-msg" class="mt-4 text-center text-sm font-medium"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
