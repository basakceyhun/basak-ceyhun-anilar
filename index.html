<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAŞAK & CEYHUN - Anı Defteri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Zarif Yazı Tipleri -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card max-w-xl w-full rounded-3xl shadow-2xl p-8 text-center border border-white/50">
        <!-- Başlık Bölümü -->
        <div class="mb-8">
            <h1 class="text-4xl md:text-5xl font-serif text-rose-800 mb-2 tracking-tight">BAŞAK & CEYHUN</h1>
            <div class="flex items-center justify-center gap-4 text-rose-600 mb-2">
                <span class="h-[1px] w-12 bg-rose-300"></span>
                <p class="font-medium tracking-[0.2em] uppercase text-xs">13.09.2026</p>
                <span class="h-[1px] w-12 bg-rose-300"></span>
            </div>
            <p class="text-slate-500 italic mt-4 text-sm">Hayatımızın en güzel gününden unutulmaz kareler...</p>
        </div>

        <!-- Yükleme Alanı -->
        <div id="drop-zone" class="border-2 border-dashed border-rose-200 rounded-2xl p-10 text-center hover:border-rose-400 transition-all cursor-pointer bg-rose-50/40 group relative overflow-hidden">
            <input type="file" id="file-input" multiple class="hidden" accept=".jpg,.jpeg,.png,.heic,.mp4,.mov">
            <div class="mb-4 transform group-hover:scale-110 transition-transform duration-500">
                <i class="fas fa-camera-retro text-5xl text-rose-300"></i>
            </div>
            <p class="text-lg font-medium text-slate-700">Fotoğraf veya Videoları Seçin</p>
            <p class="text-xs text-slate-400 mt-2 italic">Sürükleyip bırakabilir veya dokunabilirsiniz</p>
        </div>

        <!-- Dosya Listesi (Yükleme Öncesi Görünüm) -->
        <div id="file-list" class="mt-6 space-y-3 max-h-48 overflow-y-auto custom-scrollbar"></div>

        <!-- Yükleme Butonu -->
        <button id="upload-btn" class="w-full mt-8 bg-rose-600 hover:bg-rose-700 text-white font-semibold py-4 rounded-xl transition-all shadow-lg shadow-rose-200 hidden transform active:scale-95">
            <i class="fas fa-heart mr-2"></i> Anıları Bize Gönder
        </button>

        <!-- Teşekkür Mesajı Alt Bölüm -->
        <div class="mt-10 pt-8 border-t border-rose-100">
            <p class="text-rose-800 text-[13px] md:text-sm leading-relaxed italic font-light px-4">
                "Bu mutlu anımızı bizlerle paylaştığınız için teşekkür ederiz. <br>
                Bizler de bize ilettiğiniz bu anıları ömür boyu saklayacağız."
            </p>
        </div>

        <!-- Durum Bildirimleri -->
        <div id="status-msg" class="mt-4 text-sm font-medium"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
